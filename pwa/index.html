<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAD Test — Plan B</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #0f0f12; color: #e0e0e0; padding: 20px; font-size: 13px; }
h1 { color: #E03C2F; margin-bottom: 16px; font-size: 16px; }
.controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
button { padding: 10px 20px; border-radius: 8px; border: none; font-family: monospace; font-size: 13px; cursor: pointer; font-weight: 600; }
#btn-start { background: #E03C2F; color: #fff; }
#btn-stop  { background: #333; color: #aaa; }
#btn-clear { background: #222; color: #666; }
.settings { background: #1a1a1f; border: 1px solid #2a2a35; border-radius: 8px; padding: 12px; margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.setting { display: flex; flex-direction: column; gap: 4px; }
.setting label { font-size: 11px; color: #666; }
.setting input { background: #222; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; color: #e0e0e0; font-family: monospace; font-size: 13px; outline: none; }
.setting input:focus { border-color: #E03C2F; }
.setting .val { font-size: 11px; color: #E03C2F; }
.vad-state { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
.vad-state.idle      { background: #222; color: #666; }
.vad-state.listening { background: #1a2a1a; color: #4ade80; }
.vad-state.recording { background: #2a1a1a; color: #E03C2F; }
.vad-state.uploading { background: #1a1a2a; color: #60a5fa; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
.dot.blink { animation: blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
.log { background: #111; border: 1px solid #2a2a35; border-radius: 8px; padding: 10px; height: 300px; overflow-y: auto; margin-bottom: 16px; }
.log-entry { padding: 3px 0; border-bottom: 1px solid #1a1a1a; line-height: 1.5; }
.log-entry .ts  { color: #444; margin-right: 8px; }
.log-entry.info .msg { color: #e0e0e0; }
.log-entry.ok   .msg { color: #4ade80; }
.log-entry.warn .msg { color: #fbbf24; }
.log-entry.err  .msg { color: #f87171; }
.log-entry.blue .msg { color: #60a5fa; }
.dialog-card { background: #1a1a1f; border: 1px solid #2a2a35; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.dialog-card .score { font-size: 20px; font-weight: 700; color: #E03C2F; }
.dialog-card .meta  { font-size: 11px; color: #555; margin-bottom: 6px; }
.dialog-card .text  { font-size: 12px; color: #aaa; line-height: 1.5; margin-top: 6px; }
</style>
</head>
<body>

<h1>🎙 Plan B — Silero VAD Test</h1>

<div class="settings">
  <div class="setting">
    <label>Token</label>
    <input type="text" id="token" value="582a1fd3bba882b360419fb61c296cba6a0872297369a431afecd972a6122b7ca751d8fa23f66e4692b1db7f6108e910">
  </div>
  <div class="setting">
    <label>Employee User ID</label>
    <input type="number" id="emp-id" value="4">
  </div>
  <div class="setting">
    <label>positiveSpeechThreshold (0-1)</label>
    <input type="range" id="pos-threshold" min="0.1" max="0.99" step="0.05" value="0.5" oninput="document.getElementById('pos-val').textContent=this.value">
    <span class="val" id="pos-val">0.5</span>
  </div>
  <div class="setting">
    <label>negativeSpeechThreshold (0-1)</label>
    <input type="range" id="neg-threshold" min="0.05" max="0.9" step="0.05" value="0.35" oninput="document.getElementById('neg-val').textContent=this.value">
    <span class="val" id="neg-val">0.35</span>
  </div>
  <div class="setting">
    <label>minSpeechFrames</label>
    <input type="number" id="min-frames" value="3" min="1" max="20">
  </div>
  <div class="setting">
    <label>preSpeechPadFrames</label>
    <input type="number" id="pad-frames" value="1" min="0" max="10">
  </div>
</div>

<div class="controls">
  <button id="btn-start" onclick="startVAD()">▶ Старт</button>
  <button id="btn-stop"  onclick="stopVAD()" disabled>■ Стоп</button>
  <button id="btn-clear" onclick="document.getElementById('log').innerHTML=''">✕ Лог</button>
</div>

<div class="vad-state idle" id="vad-state">
  <div class="dot"></div>
  <span id="vad-state-text">Не активний</span>
</div>

<div class="log" id="log"></div>
<div id="dialogs"></div>

<script type="module">
import { MicVAD, utils } from 'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.22/dist/bundle.min.js';

const API = 'https://primary-production-4b93e.up.railway.app/webhook';

let vad = null;
let uploadQueue = [];
let isUploading = false;

function log(msg, type='info') {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString('uk', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const div = document.createElement('div');
  div.className = `log-entry ${type}`;
  div.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function setState(state, text) {
  const el = document.getElementById('vad-state');
  el.className = `vad-state ${state}`;
  document.getElementById('vad-state-text').textContent = text;
  el.querySelector('.dot').className = 'dot' + (state !== 'idle' ? ' blink' : '');
}

window.startVAD = async function() {
  const posThreshold = parseFloat(document.getElementById('pos-threshold').value);
  const negThreshold = parseFloat(document.getElementById('neg-threshold').value);
  const minFrames    = parseInt(document.getElementById('min-frames').value);
  const padFrames    = parseInt(document.getElementById('pad-frames').value);

  log('Завантаження Silero VAD...', 'blue');
  setState('listening', 'Завантаження...');

  try {
    vad = await MicVAD.new({
      positiveSpeechThreshold: posThreshold,
      negativeSpeechThreshold: negThreshold,
      minSpeechFrames:         minFrames,
      preSpeechPadFrames:      padFrames,

      onSpeechStart: () => {
        log('▶ Мовлення почалось', 'ok');
        setState('recording', 'Запис мовлення...');
      },

      onSpeechEnd: (audio) => {
        log(`■ Мовлення закінчилось. Фреймів: ${audio.length}`, 'warn');
        setState('listening', 'Слухаю...');
        const wavBuffer = utils.encodeWAV(audio);
        const blob = new Blob([wavBuffer], { type: 'audio/wav' });
        log(`Файл: ${(blob.size/1024).toFixed(1)}KB`, 'info');
        enqueueUpload(blob);
      },

      onVADMisfire: () => {
        log('~ Помилкове спрацювання (занадто короткий звук)', 'warn');
        setState('listening', 'Слухаю...');
      }
    });

    vad.start();
    setState('listening', 'Слухаю мовлення...');
    log('✓ Silero VAD активовано. Говоріть!', 'ok');
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled  = false;

  } catch(e) {
    log('✗ Помилка: ' + e.message, 'err');
    setState('idle', 'Помилка');
  }
};

window.stopVAD = function() {
  if (vad) { vad.pause(); vad = null; }
  setState('idle', 'Зупинено');
  log('VAD зупинено', 'warn');
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
};

function enqueueUpload(blob) {
  uploadQueue.push(blob);
  log(`Черга: ${uploadQueue.length}`, 'info');
  processQueue();
}

async function processQueue() {
  if (isUploading || uploadQueue.length === 0) return;
  isUploading = true;
  const blob = uploadQueue.shift();
  setState('uploading', `Відправка... (черга: ${uploadQueue.length})`);
  log(`⬆ Відправляю на сервер...`, 'blue');
  try {
    await uploadDialog(blob);
  } catch(e) {
    log('✗ Помилка відправки: ' + e.message, 'err');
  } finally {
    isUploading = false;
    setState('listening', 'Слухаю...');
    processQueue();
  }
}

async function uploadDialog(blob) {
  const token = document.getElementById('token').value.trim();
  const empId = document.getElementById('emp-id').value;
  if (!token) { log('✗ Немає токену!', 'err'); return; }

  const formData = new FormData();
  formData.append('token',            token);
  formData.append('employee_user_id', empId);
  formData.append('audio',            blob, 'dialog.wav');

  const t0   = Date.now();
  const res  = await fetch(API + '/pb/dialogs/upload', { method:'POST', body: formData });
  const data = await res.json();
  const ms   = Date.now() - t0;

  if (data.success) {
    log(`✓ Готово за ${ms}мс. Score: ${data.dialog.ai_score}`, 'ok');
    // Get full details
    const dialogId = data.dialog.dialog_id || data.dialog.id;
    try {
      const res2  = await fetch(API + '/pb/dialogs/get', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token, dialog_id: dialogId }) });
      const data2 = await res2.json();
      if (data2.success) showDialog(data2.dialog);
      else showDialog(data.dialog);
    } catch(e) { showDialog(data.dialog); }
  } else {
    log('✗ ' + JSON.stringify(data), 'err');
  }
}

function showDialog(d) {
  const id = d.dialog_id || d.id;
  document.getElementById('dlg-' + id)?.remove();
  const result = d.ai_result || {};
  const div = document.createElement('div');
  div.className = 'dialog-card';
  div.id = 'dlg-' + id;
  div.innerHTML = `
    <div class="meta">Dialog #${id} · ${new Date(d.recorded_at||Date.now()).toLocaleTimeString()}</div>
    <div class="score">${d.ai_score||0}/100</div>
    ${result.summary ? `<div class="text">${result.summary}</div>` : ''}
    ${result.violations?.length ? `<div class="text" style="color:#f87171">⚠ ${result.violations.join(' · ')}</div>` : ''}
    ${result.strengths?.length  ? `<div class="text" style="color:#4ade80">✓ ${result.strengths.join(' · ')}</div>` : ''}
    ${d.transcript ? `<div class="text" style="border-top:1px solid #222;padding-top:6px;margin-top:6px">${d.transcript.slice(0,300)}</div>` : ''}
  `;
  document.getElementById('dialogs').prepend(div);
}
</script>
</body>
</html>

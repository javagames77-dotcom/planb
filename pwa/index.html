<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAD Test — Plan B</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #0f0f12; color: #e0e0e0; padding: 20px; font-size: 13px; }
h1 { color: #E03C2F; margin-bottom: 4px; font-size: 16px; }
.sub { color: #555; font-size: 11px; margin-bottom: 16px; }
.settings { background: #1a1a1f; border: 1px solid #2a2a35; border-radius: 8px; padding: 12px; margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.setting label { font-size: 11px; color: #666; display: block; margin-bottom: 3px; }
.setting input[type=range] { width: 100%; }
.setting input[type=text], .setting input[type=number] { background: #222; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; color: #e0e0e0; font-family: monospace; font-size: 12px; outline: none; width: 100%; }
.val { font-size: 11px; color: #E03C2F; }
.controls { display: flex; gap: 10px; margin-bottom: 16px; }
button { padding: 10px 20px; border-radius: 8px; border: none; font-family: monospace; font-size: 13px; cursor: pointer; font-weight: 600; }
#btn-start { background: #E03C2F; color: #fff; }
#btn-stop  { background: #333; color: #aaa; }
#btn-clear { background: #1a1a1f; color: #555; }
.vad-state { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
.vad-state.idle      { background: #222; color: #666; }
.vad-state.loading   { background: #1a1a2a; color: #a78bfa; }
.vad-state.listening { background: #1a2a1a; color: #4ade80; }
.vad-state.recording { background: #2a1a1a; color: #E03C2F; }
.vad-state.uploading { background: #1a1a2a; color: #60a5fa; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
.blink { animation: blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
.log { background: #111; border: 1px solid #2a2a35; border-radius: 8px; padding: 10px; height: 280px; overflow-y: auto; margin-bottom: 12px; }
.entry { padding: 2px 0; border-bottom: 1px solid #181818; line-height: 1.5; }
.ts { color: #333; margin-right: 6px; }
.info .msg { color: #ccc; }
.ok   .msg { color: #4ade80; }
.warn .msg { color: #fbbf24; }
.err  .msg { color: #f87171; }
.blue .msg { color: #60a5fa; }
.dialog-card { background: #1a1a1f; border: 1px solid #2a2a35; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.d-meta  { font-size: 10px; color: #444; margin-bottom: 4px; }
.d-score { font-size: 22px; font-weight: 700; color: #E03C2F; }
.d-text  { font-size: 12px; color: #888; line-height: 1.5; margin-top: 5px; }
</style>
</head>
<body>

<h1>🎙 Plan B — Silero VAD Test</h1>
<div class="sub">Використовує @ricky0123/vad-web — нейромережа для визначення мовлення</div>

<div class="settings">
  <div class="setting">
    <label>positiveSpeechThreshold</label>
    <input type="range" id="pos" min="0.1" max="0.99" step="0.05" value="0.5" oninput="document.getElementById('posv').textContent=parseFloat(this.value).toFixed(2)">
    <span class="val" id="posv">0.50</span>
  </div>
  <div class="setting">
    <label>negativeSpeechThreshold</label>
    <input type="range" id="neg" min="0.05" max="0.9" step="0.05" value="0.35" oninput="document.getElementById('negv').textContent=parseFloat(this.value).toFixed(2)">
    <span class="val" id="negv">0.35</span>
  </div>
  <div class="setting">
    <label>minSpeechFrames</label>
    <input type="number" id="minf" value="3" min="1" max="30">
  </div>
  <div class="setting">
    <label>preSpeechPadFrames</label>
    <input type="number" id="padf" value="1" min="0" max="10">
  </div>
  <div class="setting">
    <label>Token</label>
    <input type="text" id="token" value="582a1fd3bba882b360419fb61c296cba6a0872297369a431afecd972a6122b7ca751d8fa23f66e4692b1db7f6108e910">
  </div>
  <div class="setting">
    <label>Employee User ID</label>
    <input type="number" id="empid" value="4">
  </div>
</div>

<div class="controls">
  <button id="btn-start" onclick="startVAD()">▶ Старт</button>
  <button id="btn-stop"  onclick="stopVAD()" disabled>■ Стоп</button>
  <button id="btn-clear" onclick="document.getElementById('log').innerHTML=''">✕ Лог</button>
</div>

<div class="vad-state idle" id="state">
  <div class="dot" id="dot"></div>
  <span id="state-text">Не активний</span>
</div>

<div class="log" id="log"></div>
<div id="dialogs"></div>

<!-- КРОК 1: onnxruntime-web -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
<!-- КРОК 2: vad-web bundle (глобальний об'єкт vad) -->
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>

<script>
const API = 'https://primary-production-4b93e.up.railway.app/webhook';
const VAD_VERSION = '0.0.29';
const ORT_VERSION = '1.22.0';

let myvad = null;
let uploadQueue = [];
let isUploading = false;

function log(msg, type='info') {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString('uk',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d  = document.createElement('div');
  d.className = `entry ${type}`;
  d.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setState(s, text) {
  const el   = document.getElementById('state');
  const dot  = document.getElementById('dot');
  el.className  = `vad-state ${s}`;
  document.getElementById('state-text').textContent = text;
  dot.className = s !== 'idle' ? 'dot blink' : 'dot';
}

async function startVAD() {
  // Check if vad library loaded
  if (typeof vad === 'undefined') {
    log('✗ Бібліотека vad не завантажена! Перевірте інтернет.', 'err');
    return;
  }

  setState('loading', 'Завантаження моделі...');
  log('Ініціалізація Silero VAD...', 'blue');
  log(`CDN: vad-web@${VAD_VERSION} + onnxruntime-web@${ORT_VERSION}`, 'info');

  try {
    myvad = await vad.MicVAD.new({
      positiveSpeechThreshold: parseFloat(document.getElementById('pos').value),
      negativeSpeechThreshold: parseFloat(document.getElementById('neg').value),
      minSpeechFrames:         parseInt(document.getElementById('minf').value),
      preSpeechPadFrames:      parseInt(document.getElementById('padf').value),

      // Обов'язково для CDN підключення
      onnxWASMBasePath: `https://cdn.jsdelivr.net/npm/onnxruntime-web@${ORT_VERSION}/dist/`,
      baseAssetPath:    `https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@${VAD_VERSION}/dist/`,

      onSpeechStart: () => {
        log('▶ Мовлення розпочалось', 'ok');
        setState('recording', 'Записую мовлення...');
      },

      onSpeechEnd: (audio) => {
        const secs = (audio.length / 16000).toFixed(1);
        log(`■ Мовлення закінчилось. Тривалість: ~${secs}с, фреймів: ${audio.length}`, 'warn');
        setState('listening', 'Слухаю...');
        // Конвертуємо Float32Array → WAV
        const wav = vad.utils.encodeWAV(audio);
        const blob = new Blob([wav], { type: 'audio/wav' });
        log(`Файл: ${(blob.size/1024).toFixed(1)} KB`, 'info');
        enqueueUpload(blob);
      },

      onVADMisfire: () => {
        log('~ Хибне спрацювання (занадто коротко)', 'warn');
        setState('listening', 'Слухаю...');
      }
    });

    myvad.start();
    setState('listening', 'Слухаю мовлення...');
    log('✓ Silero VAD активовано! Говоріть.', 'ok');
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled  = false;

  } catch(e) {
    log('✗ Помилка ініціалізації: ' + e.message, 'err');
    log('Якщо Safari — оновіть до iOS 16.4+', 'warn');
    setState('idle', 'Помилка');
  }
}

function stopVAD() {
  if (myvad) { myvad.pause(); myvad = null; }
  setState('idle', 'Зупинено');
  log('VAD зупинено', 'warn');
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
}

// ── Sequential upload queue ───────────────────────────────────
function enqueueUpload(blob) {
  uploadQueue.push(blob);
  log(`Черга відправки: ${uploadQueue.length}`, 'info');
  processQueue();
}

async function processQueue() {
  if (isUploading || uploadQueue.length === 0) return;
  isUploading = true;
  const blob = uploadQueue.shift();
  setState('uploading', `Відправка... (черга: ${uploadQueue.length})`);
  try {
    await uploadDialog(blob);
  } catch(e) {
    log('✗ ' + e.message, 'err');
  } finally {
    isUploading = false;
    setState('listening', 'Слухаю...');
    processQueue();
  }
}

async function uploadDialog(blob) {
  const token = document.getElementById('token').value.trim();
  const empId = document.getElementById('empid').value;
  if (!token) { log('✗ Немає токену!', 'err'); return; }

  log('⬆ Відправляю на сервер...', 'blue');
  const fd = new FormData();
  fd.append('token',            token);
  fd.append('employee_user_id', empId);
  fd.append('audio',            blob, 'dialog.wav');

  const t0   = Date.now();
  const res  = await fetch(API + '/pb/dialogs/upload', { method:'POST', body: fd });
  const data = await res.json();
  const ms   = Date.now() - t0;

  if (data.success) {
    log(`✓ Готово за ${ms}мс | Score: ${data.dialog.ai_score} | ID: ${data.dialog.dialog_id||data.dialog.id}`, 'ok');
    // Get full details
    const dialogId = data.dialog.dialog_id || data.dialog.id;
    try {
      const r2 = await fetch(API + '/pb/dialogs/get', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, dialog_id: dialogId })
      });
      const d2 = await r2.json();
      showDialog(d2.success ? d2.dialog : data.dialog);
    } catch(e) { showDialog(data.dialog); }
  } else {
    log('✗ ' + JSON.stringify(data), 'err');
  }
}

function showDialog(d) {
  const id = d.dialog_id || d.id;
  document.getElementById('dlg-'+id)?.remove();
  const r = d.ai_result || {};
  const el = document.createElement('div');
  el.className = 'dialog-card';
  el.id = 'dlg-' + id;
  el.innerHTML = `
    <div class="d-meta">Dialog #${id} · ${new Date(d.recorded_at||Date.now()).toLocaleTimeString()}</div>
    <div class="d-score">${d.ai_score||0}/100</div>
    ${r.summary    ? `<div class="d-text">${r.summary}</div>` : ''}
    ${r.violations?.length ? `<div class="d-text" style="color:#f87171">⚠ ${r.violations.join(' · ')}</div>` : ''}
    ${r.strengths?.length  ? `<div class="d-text" style="color:#4ade80">✓ ${r.strengths.join(' · ')}</div>`  : ''}
    ${d.transcript  ? `<div class="d-text" style="border-top:1px solid #222;padding-top:5px;margin-top:5px">${d.transcript.slice(0,250)}</div>` : ''}
  `;
  document.getElementById('dialogs').prepend(el);
}

// Check libraries loaded
window.addEventListener('load', () => {
  if (typeof vad === 'undefined') {
    log('✗ vad-web не завантажено! Можливо проблема з CDN або мережею.', 'err');
  } else {
    log('✓ vad-web завантажено', 'ok');
    log('✓ Готово до роботи. Натисніть Старт.', 'ok');
  }
  if (typeof ort === 'undefined') {
    log('✗ onnxruntime-web не завантажено!', 'err');
  } else {
    log('✓ onnxruntime-web завантажено', 'ok');
  }
});
</script>
</body>
</html>
